version: 2

project_name: pipeline-alert

before:
  hooks:
    - go mod tidy

builds:
  - id: server
    main: ./cmd/server
    binary: server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w

  - id: client
    main: ./cmd/client
    binary: pipeline-horn-client
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - 7
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w

archives: []

dockers_v2:
  - id: server
    ids:
      - server
    dockerfile: Dockerfile.release
    images:
      - "ghcr.io/frostwalk/pipeline-alert"
    tags:
      - "{{ .Tag }}"
      - "latest"
    labels:
      org.opencontainers.image.source: "https://github.com/FrostWalk/pipeline-alert"
      org.opencontainers.image.description: "GitLab pipeline failure alert server"
    platforms:
      - linux/amd64

nfpms:
  - id: pipeline-horn-client
    package_name: pipeline-horn-client
    ids:
      - client
    formats:
      - deb
    vendor: FrostWalk
    homepage: https://github.com/FrostWalk/pipeline-alert
    maintainer: Federico <federico@example.com>
    description: Raspberry Pi client for GitLab pipeline failure alerts.
    section: utils
    priority: optional
    dependencies:
      - alsa-utils | mpg123
    contents:
      - src: debian/pipeline-horn-client.service
        dst: /lib/systemd/system/pipeline-horn-client.service
      - src: debian/pipeline-horn-client.default
        dst: /etc/default/pipeline-horn-client
        type: config
    overrides:
      deb:
        scripts:
          postinstall: debian/postinst
          preremove: debian/prerm

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

release:
  github:
    owner: FrostWalk
    name: pipeline-alert
  draft: false
  prerelease: auto
